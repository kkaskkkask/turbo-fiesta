<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏排行榜爬虫 - Game Crawler</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>🎮 游戏排行榜爬虫</h1>
            <p class="subtitle">实时获取Steam、TapTap等平台的游戏排行榜数据</p>
        </header>

        <!-- 控制面板 -->
        <section class="control-panel">
            <div class="form-group">
                <label for="platform">选择平台</label>
                <select id="platform" class="select-input">
                    <option value="auto">🔍 自动识别 (需输入URL)</option>
                    <option value="steam">🔥 Steam Charts - 在线人数榜</option>
                    <option value="taptap">📱 TapTap - 热门游戏榜</option>
                </select>
            </div>

            <div class="form-group">
                <label for="url">自定义URL (可选)</label>
                <input type="text" id="url" class="text-input" placeholder="例如: https://steamcharts.com/top">
            </div>

            <button id="crawlBtn" class="crawl-btn">
                <span class="btn-text">🚀 开始爬取</span>
                <span class="btn-loading" style="display: none;">
                    <span class="spinner"></span>
                    爬取中...
                </span>
            </button>
        </section>

        <!-- 进度提示 -->
        <div id="progress" class="progress-box" style="display: none;">
            <div class="progress-message">正在爬取数据，请稍候...</div>
        </div>

        <!-- 错误提示 -->
        <div id="error" class="error-box" style="display: none;"></div>

        <!-- 结果区域 -->
        <section id="results" class="results-section" style="display: none;">
            <!-- 结果头部 -->
            <div class="results-header">
                <h2>📊 爬取结果</h2>
                <div class="results-meta">
                    <span id="platformName"></span>
                    <span id="crawlTime"></span>
                    <span id="recordCount"></span>
                </div>
                <div class="export-buttons">
                    <button id="exportCsv" class="export-btn csv-btn">📥 导出CSV</button>
                    <button id="exportJson" class="export-btn json-btn">📥 导出JSON</button>
                </div>
            </div>

            <!-- 数据筛选 -->
            <div class="filter-section">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜索游戏名称...">
            </div>

            <!-- 图表区域 -->
            <div class="chart-section">
                <h3>📈 TOP 10 游戏热度对比</h3>
                <div class="chart-container">
                    <canvas id="rankingChart"></canvas>
                </div>
            </div>

            <!-- 数据表格 -->
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th data-sort="rank">排名 ↕</th>
                            <th data-sort="game_name">游戏名称 ↕</th>
                            <th data-sort="current_players">当前在线/下载 ↕</th>
                            <th data-sort="peak_players">峰值人数 ↕</th>
                            <th>详情链接</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>

            <!-- 分页 -->
            <div class="pagination" id="pagination">
            </div>
        </section>

        <!-- 历史记录 -->
        <section class="history-section">
            <h2>📜 爬取历史</h2>
            <div id="historyList" class="history-list">
                <p class="empty-history">暂无历史记录</p>
            </div>
        </section>

        <!-- 页脚 -->
        <footer class="footer">
            <p>© 2024 游戏排行榜爬虫 | 数据仅供参考</p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
